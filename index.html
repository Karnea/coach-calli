<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Coach Callisthénie</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E1116;
  --slab:#171C24;
  --slab2:#1F2630;
  --line:#2B3542;
  --chalk:#EDF0F3;
  --mute:#8794A3;
  --rust:#E4572E;
  --rust-d:#B93F1C;
  --lime:#B8E62F;
  --steel:#4A9FD8;
  --ok:#3DD68C;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink);
  color:var(--chalk);
  font-family:'Inter',system-ui,sans-serif;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
#app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;position:relative}

/* ---------- topbar ---------- */
.top{
  position:sticky;top:0;z-index:40;
  background:rgba(14,17,22,.94);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  padding:14px 18px 12px;
  display:flex;align-items:center;gap:12px;
}
.brand{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:19px;letter-spacing:.10em;text-transform:uppercase;
  flex:1;line-height:1;
}
.brand em{color:var(--rust);font-style:normal}
.wk{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  color:var(--mute);letter-spacing:.08em;
  border:1px solid var(--line);border-radius:5px;padding:5px 8px;
}
.iconbtn{
  background:none;border:1px solid var(--line);color:var(--mute);
  width:32px;height:32px;border-radius:8px;cursor:pointer;
  display:grid;place-items:center;font-size:15px;transition:.15s;
}
.iconbtn:hover{border-color:var(--rust);color:var(--rust)}

/* ---------- progress rail ---------- */
.rail{height:3px;background:var(--slab2);position:sticky;top:57px;z-index:39}
.rail i{display:block;height:100%;background:var(--rust);width:0;transition:width .35s cubic-bezier(.2,.9,.3,1)}

main{flex:1;padding:20px 18px 130px}

/* ---------- home ---------- */
.hey{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:700;letter-spacing:-.01em;line-height:1;margin-bottom:6px}
.sub{color:var(--mute);font-size:13px;margin-bottom:24px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:26px}
.stat{background:var(--slab);border:1px solid var(--line);border-radius:12px;padding:13px 11px}
.stat b{display:block;font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:700;line-height:1;margin-bottom:5px}
.stat span{font-size:9px;color:var(--mute);text-transform:uppercase;letter-spacing:.09em;font-weight:600}

.lbl{
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.14em;
  font-size:12px;font-weight:600;color:var(--mute);margin:0 0 12px;
  display:flex;align-items:center;gap:9px;
}
.lbl::after{content:"";flex:1;height:1px;background:var(--line)}

.card{
  background:var(--slab);border:1px solid var(--line);border-radius:14px;
  padding:16px;margin-bottom:9px;cursor:pointer;transition:.16s;
  display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;
}
.card:active{transform:scale(.985)}
.card:hover{border-color:#3B4757}
.card.today{border-color:var(--rust)}
.card.today::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rust)}
.dot{
  width:42px;height:42px;border-radius:11px;flex-shrink:0;
  display:grid;place-items:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;
  background:var(--slab2);color:var(--mute);
}
.card.today .dot{background:var(--rust);color:#fff}
.card.done .dot{background:rgba(61,214,140,.14);color:var(--ok)}
.ci{flex:1;min-width:0}
.ci h4{font-size:15px;font-weight:600;margin-bottom:3px}
.ci p{font-size:11.5px;color:var(--mute)}
.tag{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:.06em;padding:4px 7px;border-radius:5px;flex-shrink:0;
  background:var(--slab2);color:var(--mute);
}
.card.today .tag{background:var(--rust);color:#fff}
.card.done .tag{background:rgba(61,214,140,.14);color:var(--ok)}

.pillbox{background:var(--slab);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:9px}
.pillrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0}
.pillrow+.pillrow{border-top:1px solid var(--line)}
.pillrow small{font-size:12px;color:var(--mute)}
.pillrow b{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
.pillrow b.hi{color:var(--lime)}

/* ---------- session ---------- */
.shead{margin-bottom:20px}
.shead .k{
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--rust);
  font-weight:700;letter-spacing:.12em;margin-bottom:7px;
}
.shead h2{font-family:'Barlow Condensed',sans-serif;font-size:31px;font-weight:700;line-height:1;letter-spacing:-.01em}

.ex{
  background:var(--slab);border:1px solid var(--line);border-radius:14px;
  margin-bottom:10px;overflow:hidden;transition:.18s;
}
.ex.act{border-color:var(--rust)}
.ex.fin{opacity:.5}
.exh{padding:15px;display:flex;align-items:center;gap:13px;cursor:pointer}
.num{
  width:26px;height:26px;border-radius:7px;flex-shrink:0;
  display:grid;place-items:center;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  background:var(--slab2);color:var(--mute);
}
.ex.act .num{background:var(--rust);color:#fff}
.ex.fin .num{background:rgba(61,214,140,.15);color:var(--ok)}
.exn{flex:1;min-width:0}
.exn h5{font-size:14.5px;font-weight:600;margin-bottom:3px;line-height:1.3}
.exn p{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--mute);font-weight:500}
.chev{color:var(--mute);font-size:11px;transition:.2s;flex-shrink:0}
.ex.act .chev{transform:rotate(90deg);color:var(--rust)}

.exb{display:none;padding:0 15px 15px;border-top:1px solid var(--line);margin-top:0;padding-top:15px}
.ex.act .exb{display:block}

.how{background:var(--slab2);border-radius:10px;padding:13px;margin-bottom:14px}
.how h6{
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.11em;
  font-size:10px;color:var(--steel);margin-bottom:9px;font-weight:700;
}
.how ol{margin-left:15px;font-size:12.5px;line-height:1.55;color:#C3CBD4}
.how ol li{margin-bottom:5px}
.warn{
  margin-top:11px;padding:9px 11px;background:rgba(228,87,46,.09);
  border-left:2px solid var(--rust);border-radius:0 6px 6px 0;
  font-size:11.5px;line-height:1.5;color:#DCC5BC;
}
.warn b{color:var(--rust)}

.sets{display:flex;flex-direction:column;gap:7px}
.set{
  display:grid;grid-template-columns:26px 1fr 1fr 34px;gap:7px;align-items:center;
}
.sidx{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mute);font-weight:700;text-align:center}
.set input{
  width:100%;background:var(--ink);border:1px solid var(--line);color:var(--chalk);
  border-radius:8px;padding:10px 8px;font-family:'JetBrains Mono',monospace;
  font-size:13px;font-weight:700;text-align:center;outline:none;transition:.15s;
}
.set input::placeholder{color:#4B5665;font-weight:500}
.set input:focus{border-color:var(--rust);background:#12161C}
.chk{
  width:34px;height:36px;border:1px solid var(--line);background:var(--ink);
  border-radius:8px;cursor:pointer;color:#4B5665;font-size:14px;
  display:grid;place-items:center;transition:.15s;
}
.chk.on{background:var(--ok);border-color:var(--ok);color:var(--ink)}
.shdr{display:grid;grid-template-columns:26px 1fr 1fr 34px;gap:7px;margin-bottom:8px}
.shdr span{
  font-size:8.5px;color:var(--mute);text-transform:uppercase;letter-spacing:.09em;
  text-align:center;font-weight:700;
}
.last{
  margin-top:11px;font-family:'JetBrains Mono',monospace;font-size:10.5px;
  color:var(--mute);padding:8px 10px;background:var(--slab2);border-radius:7px;
}
.last b{color:var(--lime)}

/* ---------- rest timer ---------- */
.rest{
  position:fixed;bottom:0;left:0;right:0;z-index:60;
  background:var(--rust);color:#fff;padding:15px 18px;
  display:none;align-items:center;gap:14px;
  max-width:520px;margin:0 auto;
  box-shadow:0 -8px 30px rgba(0,0,0,.5);
}
.rest.on{display:flex}
.rest .t{font-family:'JetBrains Mono',monospace;font-size:29px;font-weight:700;line-height:1;min-width:76px}
.rest .m{flex:1;font-size:11.5px;font-weight:600;opacity:.92;line-height:1.35}
.rest button{
  background:rgba(0,0,0,.28);border:none;color:#fff;padding:9px 14px;
  border-radius:8px;font-weight:700;font-size:11.5px;cursor:pointer;
  font-family:'Inter',sans-serif;
}

/* ---------- bottom bar ---------- */
.bar{
  position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;z-index:50;
  padding:13px 18px calc(13px + env(safe-area-inset-bottom));
  background:rgba(14,17,22,.96);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  display:flex;gap:9px;
}
.btn{
  flex:1;padding:15px;border:none;border-radius:11px;cursor:pointer;
  font-family:'Inter',sans-serif;font-weight:700;font-size:14px;transition:.15s;
}
.btn:active{transform:scale(.97)}
.p{background:var(--rust);color:#fff}
.p:hover{background:var(--rust-d)}
.s{background:var(--slab);color:var(--mute);border:1px solid var(--line);flex:0 0 88px}

.empty{text-align:center;padding:50px 20px;color:var(--mute);font-size:13px;line-height:1.6}

/* ---------- toast ---------- */
.toast{
  position:fixed;bottom:96px;left:50%;transform:translate(-50%,16px);
  background:var(--ok);color:var(--ink);padding:11px 20px;border-radius:10px;
  font-weight:700;font-size:12.5px;z-index:80;opacity:0;pointer-events:none;
  transition:.25s;white-space:nowrap;
}
.toast.on{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<div id="app">
  <div class="top">
    <div class="brand">COACH <em>CALLI</em></div>
    <div class="wk" id="wk">S01</div>
    <button class="iconbtn" id="reset" title="Réinitialiser">↺</button>
  </div>
  <div class="rail"><i id="rail"></i></div>
  <main id="main"></main>
</div>

<div class="rest" id="rest">
  <div class="t" id="rt">0:90</div>
  <div class="m" id="rm">Repos</div>
  <button onclick="skipRest()">Passer</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ DONNÉES ============ */
const TECH = {
  pullup_assist:{
    steps:["Prise pronation (paumes vers l'avant), mains un peu plus larges que les épaules.","Genoux sur le coussin. Pars bras COMPLÈTEMENT tendus, épaules basses.","Tire d'abord les omoplates vers le bas et l'arrière — comme les glisser dans tes poches arrière.","PUIS seulement plie les coudes. Menton au-dessus de la barre.","Redescends en 3 secondes jusqu'aux bras tendus."],
    warn:"Si tu ne sens que tes biceps, tu ne fais pas le mouvement. Sur cette machine, <b>plus le contrepoids est élevé, plus c'est facile</b>."
  },
  scap:{
    steps:["Suspendu bras tendus, prise pronation.","SANS PLIER LES COUDES, tire tes épaules vers le bas en rentrant les omoplates.","Ton corps ne monte que de 3-4 cm. C'est normal.","Tiens 1 seconde en haut, relâche lentement."],
    warn:"<b>Plier les coudes</b> = ce n'est plus un scapular pull-up. Les coudes ne bougent pas."
  },
  neg:{
    steps:["Monte sur une chaise pour te placer menton au-dessus de la barre.","Enlève les pieds du support. Tu es suspendu, menton au-dessus.","Descends LE PLUS LENTEMENT POSSIBLE. Vise 5 secondes minimum.","Bras tendus → remonte sur la chaise et recommence.","3-4 reps par série maximum. C'est très coûteux nerveusement."],
    warn:"Ne te <b>laisse pas tomber</b> sur la fin de la descente. Si tu ne contrôles plus, arrête la série."
  },
  dips:{
    steps:["Genoux sur le coussin, prise neutre, bras tendus, épaules basses.","Penche légèrement le buste en avant (~15°). Pas droit comme un piquet.","Descends coudes PROCHES du corps. Ne les laisse pas s'écarter.","Descends jusqu'à épaules au niveau des coudes (90°). Pas plus bas au début.","Remonte en poussant à travers les paumes."],
    warn:"<b>Coudes qui s'écartent</b> ou descente trop profonde = risque pour l'épaule."
  },
  bulg:{
    steps:["Pied arrière sur un banc. Pied avant à ~60-70 cm devant.","Descends VERTICALEMENT en pliant le genou avant, jusqu'à cuisse parallèle.","Genou avant aligné avec les orteils, ne part pas vers l'intérieur.","Remonte en poussant dans le TALON avant."],
    warn:"Trop de quadriceps → <b>avance ton pied avant</b>. Plus de fessier → penche le buste."
  },
  lsit:{
    steps:["Assis entre deux barres parallèles, mains appuyées.","Bras COMPLÈTEMENT tendus. Pousse activement vers le bas pour décoller les fesses.","Épaules basses, poitrine ouverte. Ne laisse pas les épaules monter vers les oreilles.","Ramène les genoux vers la poitrine. Tiens."],
    warn:"<b>Épaules qui remontent</b> vers les oreilles. Le mouvement vient d'une poussée active vers le bas."
  },
  row_aus:{
    steps:["Allongé sous la barre/TRX, corps aligné des talons aux épaules.","Attrape la barre, bras tendus.","Tire la POITRINE vers la barre en serrant les omoplates.","Descends contrôlé. Plus les pieds sont hauts, plus c'est dur."],
    warn:"Ne laisse pas <b>les hanches s'affaisser</b>. Le corps reste une planche."
  },
  squat:{
    steps:["Barre sur les trapèzes, pieds largeur épaules, pointes légèrement ouvertes.","Descends en poussant les hanches vers l'arrière, poitrine haute.","Descends jusqu'à cuisses parallèles au sol (ou plus bas si mobilité OK).","Remonte en poussant dans le milieu du pied."],
    warn:"<b>Genoux qui rentrent vers l'intérieur</b> à la remontée. Pousse-les vers l'extérieur."
  },
  rdl:{
    steps:["Debout, haltères devant les cuisses, genoux très légèrement fléchis.","Pousse les HANCHES vers l'arrière, dos plat. Les haltères glissent le long des jambes.","Descends jusqu'à sentir un étirement dans les ischios (~mi-tibia).","Remonte en contractant les fessiers."],
    warn:"Ce n'est <b>pas un squat</b>. Le genou bouge très peu — c'est une charnière de hanche."
  },
  gen:{steps:[],warn:""}
};

const PLAN = {
  push:{name:"Push — Poussée",day:"Lundi",dur:"60-70 min",ex:[
    {n:"Échauffement rameur + rotations épaules",s:1,r:"5-8 min",rest:0,t:"gen",unit:"min"},
    {n:"Dips à la machine assistée",s:4,r:"8-10",rest:90,t:"dips",unit:"assist kg"},
    {n:"Développé couché haltères",s:4,r:"8-12",rest:90,t:"gen",unit:"kg"},
    {n:"Pompes pieds surélevés",s:3,r:"max",rest:90,t:"gen",unit:"—"},
    {n:"Développé militaire haltères",s:3,r:"10-12",rest:75,t:"gen",unit:"kg"},
    {n:"Élévations latérales poulie",s:3,r:"12-15",rest:60,t:"gen",unit:"kg"},
    {n:"Extension triceps poulie (corde)",s:3,r:"12-15",rest:60,t:"gen",unit:"kg"},
    {n:"Gainage planche",s:3,r:"45 s",rest:45,t:"gen",unit:"sec"}
  ]},
  pull:{name:"Pull — Tirage",day:"Mardi",dur:"60-70 min",ex:[
    {n:"Scapular pull-ups",s:3,r:"8",rest:45,t:"scap",unit:"—"},
    {n:"Tractions machine assistée",s:5,r:"5-8",rest:120,t:"pullup_assist",unit:"assist kg"},
    {n:"Tractions négatives (5 s)",s:3,r:"4",rest:120,t:"neg",unit:"sec desc"},
    {n:"Tirage vertical poulie (large)",s:4,r:"10-12",rest:90,t:"gen",unit:"kg"},
    {n:"Tirage horizontal poulie basse",s:4,r:"10-12",rest:90,t:"gen",unit:"kg"},
    {n:"Rowing australien TRX",s:3,r:"10-12",rest:75,t:"row_aus",unit:"—"},
    {n:"Curl biceps barre EZ",s:3,r:"10-12",rest:60,t:"gen",unit:"kg"},
    {n:"Face pull poulie",s:3,r:"15",rest:60,t:"gen",unit:"kg"},
    {n:"Dead hang (suspension)",s:3,r:"max",rest:60,t:"gen",unit:"sec"}
  ]},
  legs:{name:"Legs — Jambes",day:"Jeudi",dur:"55-65 min",ex:[
    {n:"Squat barre (cage)",s:4,r:"8-10",rest:120,t:"squat",unit:"kg"},
    {n:"Presse à cuisses",s:4,r:"12-15",rest:90,t:"gen",unit:"kg"},
    {n:"Squat bulgare haltères",s:3,r:"10/jambe",rest:90,t:"bulg",unit:"kg"},
    {n:"Soulevé de terre roumain",s:4,r:"10-12",rest:90,t:"rdl",unit:"kg"},
    {n:"Leg curl allongé",s:3,r:"12-15",rest:75,t:"gen",unit:"kg"},
    {n:"Mollets à la presse",s:4,r:"15-20",rest:60,t:"gen",unit:"kg"},
    {n:"Relevés de jambes suspendu",s:3,r:"10-12",rest:60,t:"gen",unit:"—"}
  ]},
  full:{name:"Full-body Callisthénie",day:"Vendredi",dur:"50-60 min",ex:[
    {n:"Tractions assistées élastique",s:4,r:"5-8",rest:120,t:"pullup_assist",unit:"bande"},
    {n:"Pompes archer / diamant",s:3,r:"8-10",rest:90,t:"gen",unit:"—"},
    {n:"Dips assistés élastique",s:3,r:"6-8",rest:90,t:"dips",unit:"bande"},
    {n:"Rowing australien pieds surélevés",s:3,r:"10-12",rest:75,t:"row_aus",unit:"—"},
    {n:"Fentes marchées",s:3,r:"12/jambe",rest:75,t:"gen",unit:"kg"},
    {n:"L-sit tuck hold",s:4,r:"15-20 s",rest:60,t:"lsit",unit:"sec"},
    {n:"Hollow body hold",s:3,r:"30 s",rest:45,t:"gen",unit:"sec"}
  ]}
};

const ASSIST = [40,40,35,35,30,30,25,25,20,20,15,15,10,10,10,10];

/* ============ ÉTAT ============ */
let DB = {week:1,done:{},hist:{},cur:null,act:null,sets:{}};
let timer=null, left=0;

async function load(){
  try{
    const r = await window.storage.get('calli_v1');
    if(r && r.value) DB = JSON.parse(r.value);
  }catch(e){}
  render();
}
async function save(){
  try{ await window.storage.set('calli_v1', JSON.stringify(DB)); }catch(e){}
}

function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),1800);
}

/* ============ REPOS ============ */
function startRest(sec,label){
  if(!sec) return;
  clearInterval(timer); left=sec;
  const box=document.getElementById('rest');
  box.classList.add('on');
  document.getElementById('rm').textContent=label||'Repos — reste actif, respire';
  tick();
  timer=setInterval(()=>{ left--; tick(); if(left<=0){ skipRest(); toast('Repos terminé — série suivante'); } },1000);
}
function tick(){
  const m=Math.floor(left/60), s=left%60;
  document.getElementById('rt').textContent=m+':'+String(s).padStart(2,'0');
}
function skipRest(){
  clearInterval(timer);
  document.getElementById('rest').classList.remove('on');
}

/* ============ RENDU ============ */
function render(){
  document.getElementById('wk').textContent='S'+String(DB.week).padStart(2,'0');
  DB.cur ? renderSession() : renderHome();
}

function renderHome(){
  skipRest();
  const d=new Date().getDay();
  const map={1:'push',2:'pull',4:'legs',5:'full'};
  const today=map[d];
  const wk=DB.done['w'+DB.week]||{};
  const nDone=Object.keys(wk).length;
  const assist=ASSIST[Math.min(DB.week-1,15)];
  const tot=Object.values(DB.done).reduce((a,o)=>a+Object.keys(o).length,0);

  const cards = Object.entries(PLAN).map(([k,v])=>{
    const done = wk[k];
    const cls = done?'done':(k===today?'today':'');
    const badge = done?'FAIT':(k===today?'AUJOURD\'HUI':v.dur.split(' ')[0]+'min');
    const ini = v.name.split(' ')[0].slice(0,2).toUpperCase();
    return `<div class="card ${cls}" onclick="open_('${k}')">
      <div class="dot">${ini}</div>
      <div class="ci"><h4>${v.name}</h4><p>${v.day} · ${v.ex.length} exercices · ${v.dur}</p></div>
      <div class="tag">${badge}</div>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML=`
    <div class="hey">Semaine ${DB.week}</div>
    <div class="sub">${nDone}/4 séances faites cette semaine</div>

    <div class="stats">
      <div class="stat"><b>${DB.week}</b><span>Semaine</span></div>
      <div class="stat"><b>${tot}</b><span>Séances</span></div>
      <div class="stat"><b style="color:var(--lime)">${assist}<small style="font-size:11px">kg</small></b><span>Assist. cible</span></div>
    </div>

    <div class="lbl">Cette semaine</div>
    ${cards}

    <div class="lbl" style="margin-top:26px">Cible traction — semaine ${DB.week}</div>
    <div class="pillbox">
      <div class="pillrow"><small>Contrepoids machine</small><b class="hi">${assist} kg</b></div>
      <div class="pillrow"><small>Objectif série</small><b>5 × ${DB.week<5?'8':DB.week<9?'6-8':'5'}</b></b></div>
      <div class="pillrow"><small>Traction libre à</small><b>15 kg d'assist.</b></div>
    </div>
    <p style="font-size:11.5px;color:var(--mute);line-height:1.6;margin-top:12px">
      Sur la machine, un contrepoids <b style="color:var(--chalk)">plus élevé = plus facile</b>.
      Descends de 5 kg toutes les 2 semaines. Si tu ne tiens pas 5 séries propres, reste une semaine de plus.
    </p>`;

  document.getElementById('rail').style.width=(nDone/4*100)+'%';
  renderBar(`<button class="btn s" onclick="prevWk()">← S${Math.max(1,DB.week-1)}</button>
    <button class="btn p" onclick="nextWk()">Passer à la semaine ${DB.week+1}</button>`);
  save();
}

function renderSession(){
  const k=DB.cur, S=PLAN[k];
  const sets=DB.sets||{};
  const hist=(DB.hist[k]||{});

  const list=S.ex.map((e,i)=>{
    const on = DB.act===i;
    const key=k+'_'+i;
    const st=sets[key]||[];
    const fin = st.length===e.s && st.every(x=>x&&x.ok);
    const T=TECH[e.t]||TECH.gen;

    const tech = T.steps.length ? `
      <div class="how">
        <h6>Exécution</h6>
        <ol>${T.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
        ${T.warn?`<div class="warn"><b>À éviter :</b> ${T.warn}</div>`:''}
      </div>` : '';

    const rows = Array.from({length:e.s},(_,j)=>{
      const v=st[j]||{};
      return `<div class="set">
        <div class="sidx">${j+1}</div>
        <input type="number" inputmode="decimal" placeholder="${e.unit}" value="${v.w??''}"
          onchange="setV('${key}',${j},'w',this.value)">
        <input type="number" inputmode="numeric" placeholder="reps" value="${v.r??''}"
          onchange="setV('${key}',${j},'r',this.value)">
        <div class="chk ${v.ok?'on':''}" onclick="tog('${key}',${j},${e.rest})">✓</div>
      </div>`;
    }).join('');

    const lastTxt = hist[i] ? `<div class="last">Dernière fois : <b>${hist[i]}</b></div>` : '';

    return `<div class="ex ${on?'act':''} ${fin?'fin':''}">
      <div class="exh" onclick="pick(${i})">
        <div class="num">${fin?'✓':i+1}</div>
        <div class="exn"><h5>${e.n}</h5><p>${e.s} × ${e.r}${e.rest?' · '+e.rest+'s repos':''}</p></div>
        <div class="chev">▶</div>
      </div>
      <div class="exb">
        ${tech}
        <div class="shdr"><span></span><span>${e.unit}</span><span>Reps</span><span></span></div>
        <div class="sets">${rows}</div>
        ${lastTxt}
      </div>
    </div>`;
  }).join('');

  const totalSets=S.ex.reduce((a,e)=>a+e.s,0);
  let doneSets=0;
  S.ex.forEach((e,i)=>{ const st=sets[k+'_'+i]||[]; doneSets+=st.filter(x=>x&&x.ok).length; });

  document.getElementById('main').innerHTML=`
    <div class="shead">
      <div class="k">SEMAINE ${DB.week} · ${S.day.toUpperCase()}</div>
      <h2>${S.name}</h2>
    </div>
    ${list}`;

  document.getElementById('rail').style.width=(doneSets/totalSets*100)+'%';
  renderBar(`<button class="btn s" onclick="home()">Quitter</button>
    <button class="btn p" onclick="finish()">Terminer la séance</button>`);
}

function renderBar(html){
  let b=document.querySelector('.bar');
  if(!b){ b=document.createElement('div'); b.className='bar'; document.body.appendChild(b); }
  b.innerHTML=html;
}

/* ============ ACTIONS ============ */
function open_(k){ DB.cur=k; DB.act=0; DB.sets=DB.sets||{}; render(); window.scrollTo(0,0); }
function home(){ DB.cur=null; DB.act=null; skipRest(); render(); window.scrollTo(0,0); }
function pick(i){ DB.act = DB.act===i?null:i; renderSession(); save(); }

function setV(key,j,f,v){
  DB.sets[key]=DB.sets[key]||[];
  DB.sets[key][j]=DB.sets[key][j]||{};
  DB.sets[key][j][f]=v;
  save();
}
function tog(key,j,rest){
  DB.sets[key]=DB.sets[key]||[];
  DB.sets[key][j]=DB.sets[key][j]||{};
  const s=DB.sets[key][j];
  s.ok=!s.ok;
  renderSession();
  if(s.ok && rest) startRest(rest);
  save();
}

function finish(){
  const k=DB.cur, S=PLAN[k];
  DB.done['w'+DB.week]=DB.done['w'+DB.week]||{};
  DB.done['w'+DB.week][k]=true;
  DB.hist[k]=DB.hist[k]||{};
  S.ex.forEach((e,i)=>{
    const st=DB.sets[k+'_'+i]||[];
    const ok=st.filter(x=>x&&x.ok&&(x.w||x.r));
    if(ok.length){
      DB.hist[k][i]=ok.map(x=>`${x.w||'—'}${e.unit==='kg'||e.unit.includes('kg')?'kg':''}×${x.r||'—'}`).join('  ');
    }
  });
  DB.sets={};
  DB.cur=null; DB.act=null;
  skipRest();
  toast('Séance enregistrée');
  render();
  window.scrollTo(0,0);
}

function nextWk(){ DB.week++; DB.sets={}; render(); toast('Semaine '+DB.week); }
function prevWk(){ if(DB.week>1){ DB.week--; render(); } }

document.getElementById('reset').onclick=()=>{
  if(confirm('Effacer toutes tes données ? Cette action est définitive.')){
    DB={week:1,done:{},hist:{},cur:null,act:null,sets:{}};
    save(); render(); toast('Données effacées');
  }
};

load();
</script>
</body>
</html>
