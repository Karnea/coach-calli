var LS_LOGS="coachCalli.logs.v2", LS_BODY="coachCalli.body.v2", LS_META="coachCalli.meta.v2";
function jload(k,d){ try{ var r=localStorage.getItem(k); return r?JSON.parse(r):d; }catch(e){ return d; } }
var LOGS=jload(LS_LOGS,{});

function setSync(st,err){ SYNC.state=st; SYNC.err=err||null; paintSyncBadge(); }

function localSave(){
  try{
    localStorage.setItem(LS_LOGS,JSON.stringify(LOGS));
    localStorage.setItem(LS_BODY,JSON.stringify(BODY));
    localStorage.setItem(LS_META,JSON.stringify(META));
  }catch(e){}
}

/* Toute écriture passe par ici : local immédiat, cloud différé (anti-rafale). */
function persist(){
  localSave();
  if(!CLOUD_ENABLED || !FB.docRef || applyingRemote) return;
  setSync("saving");
  clearTimeout(pushTimer);
  pushTimer=setTimeout(pushNow,700);
}
function pushNow(){
  if(!FB.docRef) return;
  FB.setDoc(FB.docRef,{
    logs:LOGS, body:BODY, meta:META,
    updatedAt:Date.now(),
    device:(navigator.userAgent.indexOf("iPhone")>=0?"iPhone":navigator.userAgent.indexOf("Android")>=0?"Android":"Ordinateur")
  },{merge:false}).then(function(){
    SYNC.lastSync=Date.now(); setSync("ok");
  }).catch(function(e){
    setSync("err", e && e.message ? e.message : "Erreur d'écriture");
  });
}
function saveLogs(){ persist(); }
function saveBody(){ persist(); }
function saveMeta(){ persist(); }

/* ================= FUSION ================= */
/* Fusion sans perte : on garde l'union des entrées des deux côtés.
   Une entrée est identifiée par date + valeurs, ce qui évite les doublons
   tout en conservant plusieurs séries du même jour. */
function entryKey(e){
  return [e.date, e.load==null?"":e.load, e.reps==null?"":e.reps, e.levelIdx==null?"":e.levelIdx].join("|");
}
function mergeLogs(a,b){
  var out={};
  var ids={};
  Object.keys(a||{}).forEach(function(k){ ids[k]=1; });
  Object.keys(b||{}).forEach(function(k){ ids[k]=1; });
  Object.keys(ids).forEach(function(id){
    var seen={}, list=[];
    ((a&&a[id])||[]).concat((b&&b[id])||[]).forEach(function(e){
      var k=entryKey(e);
      if(!seen[k]){ seen[k]=1; list.push(e); }
    });
    list.sort(function(x,y){ return x.date<y.date?-1:x.date>y.date?1:0; });
    if(list.length) out[id]=list;
  });
  return out;
}
function mergeBody(a,b){
  var byDate={};
  (a||[]).concat(b||[]).forEach(function(x){
    var cur=byDate[x.date]||{date:x.date,weight:null,waist:null};
    if(x.weight!=null) cur.weight=x.weight;
    if(x.waist!=null) cur.waist=x.waist;
    byDate[x.date]=cur;
  });
  return Object.keys(byDate).sort().map(function(d){ return byDate[d]; });
}

/* ================= FIREBASE ================= */
function loadFirebase(){
  return new Promise(function(resolve,reject){
    if(!CLOUD_ENABLED){ reject(new Error("Config Firebase absente")); return; }
    var mod = "https://www.gstatic.com/firebasejs/10.12.2/";
    var code =
      "import { initializeApp } from '"+mod+"firebase-app.js';" +
      "import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from '"+mod+"firebase-auth.js';" +
      "import { getFirestore, doc, setDoc, getDoc, onSnapshot, enableIndexedDbPersistence } from '"+mod+"firebase-firestore.js';" +
      "window.__fb = { initializeApp, getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut, getFirestore, doc, setDoc, getDoc, onSnapshot, enableIndexedDbPersistence };" +
      "window.dispatchEvent(new Event('fbready'));";
    var s=document.createElement("script");
    s.type="module";
    s.textContent=code;
    window.addEventListener("fbready",function(){ resolve(window.__fb); },{once:true});
    s.onerror=function(){ reject(new Error("Chargement Firebase impossible")); };
    document.head.appendChild(s);
    setTimeout(function(){ if(!window.__fb) reject(new Error("Firebase n'a pas répondu")); },12000);
  });
}

function initCloud(){
  if(!CLOUD_ENABLED){ setSync("local"); return; }
  setSync("connecting");
  loadFirebase().then(function(fb){
    var app=fb.initializeApp(FIREBASE_CONFIG);
    FB.app=app;
    FB.auth=fb.getAuth(app);
    FB.db=fb.getFirestore(app);
    FB.doc=fb.doc; FB.setDoc=fb.setDoc; FB.getDoc=fb.getDoc; FB.onSnapshot=fb.onSnapshot;
    FB.provider=new fb.GoogleAuthProvider();
    FB.signInWithPopup=fb.signInWithPopup;
    FB.signInWithRedirect=fb.signInWithRedirect;
    FB.signOut=fb.signOut;

    try{ fb.enableIndexedDbPersistence(FB.db).catch(function(){}); }catch(e){}

    fb.getRedirectResult(FB.auth).catch(function(){});

    fb.onAuthStateChanged(FB.auth,function(user){
      if(user){ onSignedIn(user); }
      else{ SYNC.user=null; if(FB.unsub){FB.unsub();FB.unsub=null;} FB.docRef=null; setSync("signedout"); render(); }
    });
  }).catch(function(e){
    setSync("err", e.message);
  });
}

function onSignedIn(user){
  SYNC.user={uid:user.uid,name:user.displayName||user.email,photo:user.photoURL};
  FB.docRef=FB.doc(FB.db,"users",user.uid,"data","carnet");
  setSync("connecting");

  FB.getDoc(FB.docRef).then(function(snap){
    var remote=snap.exists()?snap.data():null;
    var hadLocal=Object.keys(LOGS).length>0 || BODY.length>0;

    if(remote){
      applyingRemote=true;
      LOGS=mergeLogs(LOGS, remote.logs||{});
      BODY=mergeBody(BODY, remote.body||[]);
      if(remote.meta && remote.meta.week) META.week=Math.max(META.week||1, remote.meta.week);
      applyingRemote=false;
      localSave();
      if(hadLocal) pushNow(); else { SYNC.lastSync=Date.now(); setSync("ok"); }
    } else {
      pushNow();
    }
    listenRemote();
    render();
  }).catch(function(e){
    setSync("err", e && e.message ? e.message : "Lecture impossible");
    render();
  });
}

function listenRemote(){
  if(FB.unsub){ FB.unsub(); }
  FB.unsub=FB.onSnapshot(FB.docRef,function(snap){
    if(!snap.exists()) return;
    var src=snap.metadata.hasPendingWrites;
    if(src) return;
    var r=snap.data();
    applyingRemote=true;
    var before=JSON.stringify([LOGS,BODY,META.week]);
    LOGS=mergeLogs(LOGS, r.logs||{});
    BODY=mergeBody(BODY, r.body||[]);
    if(r.meta && r.meta.week) META.week=Math.max(META.week||1, r.meta.week);
    applyingRemote=false;
    var after=JSON.stringify([LOGS,BODY,META.week]);
    localSave();
    SYNC.lastSync=Date.now(); setSync("ok");
    if(before!==after && !STATE.detail){ render(); }
  },function(e){
    setSync("err", e && e.message ? e.message : "Écoute interrompue");
  });
}

function doSignIn(){
  if(!FB.auth){ return; }
  setSync("connecting");
  var isStandalone = window.navigator.standalone === true ||
    (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
  if(isStandalone){
    FB.signInWithRedirect(FB.auth,FB.provider);
  } else {
    FB.signInWithPopup(FB.auth,FB.provider).catch(function(e){
      if(e && (e.code==="auth/popup-blocked"||e.code==="auth/operation-not-supported-in-this-environment")){
        FB.signInWithRedirect(FB.auth,FB.provider);
      } else {
        setSync("err", e && e.message ? e.message : "Connexion refusée");
      }
    });
  }
}
function doSignOut(){
  if(!FB.auth) return;
  if(FB.unsub){FB.unsub();FB.unsub=null;}
  FB.signOut(FB.auth).then(function(){ setSync("signedout"); render(); });
}

function todayStr(){ return new Date().toISOString().slice(0,10); }
function frDate(iso){ var p=iso.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
function isoWeek(d){ var date=new Date(d); date.setHours(0,0,0,0); date.setDate(date.getDate()+3-((date.getDay()+6)%7)); var w1=new Date(date.getFullYear(),0,4); return 1+Math.round(((date-w1)/86400000-3+((w1.getDay()+6)%7))/7); }

function formatEntry(e,track){
  if(track==="poids") return e.load+" kg × "+e.reps;
  if(track==="assist") return e.load+" kg aide × "+e.reps;
  if(track==="elastique") return e.level+" · "+e.reps+" reps";
  return e.reps+(e.reps>60?" s":"");
}

/* ================= ETAT ================= */
var STATE={tab:"home",session:null,detail:null,progressSel:null,bodyMetric:"weight"};
var app=document.getElementById("app");
function go(patch){ Object.assign(STATE,patch); render(); }

var REST_T=null, REST_LEFT=0;
function startRest(sec){
  if(!sec) return;
  clearInterval(REST_T); REST_LEFT=sec;
  var el=document.getElementById("restbar");
  if(!el){ el=document.createElement("div"); el.id="restbar"; document.body.appendChild(el); }
  el.style.cssText="position:fixed;bottom:calc(76px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:456px;background:"+C.rust+";color:#fff;padding:13px 16px;border-radius:14px;display:flex;align-items:center;gap:12px;z-index:60;box-shadow:0 8px 26px rgba(0,0,0,.5)";
  tickRest();
  REST_T=setInterval(function(){ REST_LEFT--; tickRest(); if(REST_LEFT<=0){ stopRest(); if(navigator.vibrate)navigator.vibrate([80,60,80]); } },1000);
}
function tickRest(){
  var el=document.getElementById("restbar"); if(!el) return;
  var m=Math.floor(REST_LEFT/60), s=REST_LEFT%60;
  el.innerHTML="<div style='font-size:24px;font-weight:800;min-width:64px;font-variant-numeric:tabular-nums'>"+m+":"+String(s).padStart(2,"0")+"</div><div style='flex:1;font-size:12px;font-weight:600;opacity:.92'>Repos — respire, reste debout</div><button id='skiprest' style='background:rgba(0,0,0,.28);border:none;color:#fff;padding:8px 13px;border-radius:8px;font-weight:700;font-size:12px'>Passer</button>";
  var b=document.getElementById("skiprest"); if(b) b.onclick=stopRest;
}
function stopRest(){ clearInterval(REST_T); var el=document.getElementById("restbar"); if(el) el.remove(); }

function render(){
  var html="";
  if(STATE.detail){ html=viewDetail(STATE.detail); }
  else if(STATE.session){ html=viewSession(STATE.session); }
  else if(STATE.tab==="home"){ html=viewHome(); }
  else if(STATE.tab==="progress"){ html=viewProgress(); }
  else if(STATE.tab==="guide"){ html=viewGuide(); }
  else if(STATE.tab==="body"){ html=viewBody(); }
  if(!STATE.detail){ html+=tabbar(); }
  app.innerHTML=html;
  bind();
  window.scrollTo(0,0);
}

function tabbar(){
  var items=[["home","Séances","dumbbell"],["progress","Évolution","trend"],["guide","Exercices","book"],["body","Mesures","body"]];
  var h="<nav class='tabbar'>";
  items.forEach(function(it){
    var on=STATE.tab===it[0]&&!STATE.session;
    h+="<button class='tabbtn"+(on?" on":"")+"' data-tab='"+it[0]+"'>"+icon(it[2],21,on?C.rust:C.dim,on)+"<span>"+it[1]+"</span></button>";
  });
  return h+"</nav>";
}

/* ================= SEANCE ================= */
function viewSession(k){
  var s=PROGRAM[k];

  s.exercises.forEach(function(ex){ h+=exerciseCard(ex,k,s.color); });
  h+="</div></div>";
  return h;
}

function exerciseCard(ex,k,color){
  var meta=TRACK_LABEL[ex.track];
  var entries=LOGS[ex.id]||[];
  var last=entries[entries.length-1];
  var h="<div class='card' data-card='"+ex.id+"'>";
  h+="<div style='padding:14px 15px;display:flex;gap:12px;align-items:center'>";
  h+="<div style='width:52px;height:40px;background:"+C.panel2+";border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid "+C.line+"'><div style='width:44px;height:32px'>"+figure(ex.fig)+"</div></div>";

function restSeconds(ex){

  var m=r.match(/(\d+)\s*s/); if(m) return parseInt(m[1],10);
  return 0;
}

function chartBlock(id){
  var ex=ALL[id]; var entries=LOGS[id]||[]; var track=ex.track;
  var vals=entries.map(function(e){ return track==="poids"?e.load:track==="assist"?e.load:track==="elastique"?e.levelIdx:e.reps; });
  var yLabel=track==="poids"?"Charge (kg)":track==="assist"?"Contrepoids d'aide (kg)":track==="elastique"?"Niveau élastique":"Reps / secondes";
  var invert=(track==="assist");
  var delta=vals.length>1?vals[vals.length-1]-vals[0]:0;
  var good=invert?(delta<0):(delta>0);
  var deltaColor=delta===0?C.dim:(good?C.ok:C.red);
  var deltaTxt="";
  if(vals.length>1){
    if(track==="assist") deltaTxt=delta<0?"↓ "+Math.abs(delta)+" kg d'aide en moins":delta>0?"↑ +"+delta+" kg d'aide":"stable";
    else if(track==="elastique") deltaTxt=delta>0?"↑ "+delta+" niveau(x) plus dur":delta<0?"↓ "+Math.abs(delta):"stable";
    else deltaTxt=delta>0?"↑ +"+delta:delta<0?"↓ "+delta:"stable";
  }
  var h="<div style='background:"+C.panel+";border:1px solid "+C.line+";border-radius:18px;padding:16px 12px 12px;margin-top:8px'>";
  h+="<div style='display:flex;justify-content:space-between;align-items:baseline;padding:0 6px 10px'><div style='font-size:12px;color:"+C.dim+"'>"+yLabel+"</div>"+(deltaTxt?"<div style='font-size:13px;font-weight:700;color:"+deltaColor+"'>"+deltaTxt+"</div>":"")+"</div>";
  h+=svgChart(entries,track,ex.sessionColor,id);
  if(track==="assist"){ h+="<div style='font-size:11px;color:"+C.dim+";padding:8px 8px 2px;line-height:1.45'>Ici, <b style='color:"+C.text+"'>plus la courbe descend, mieux c'est</b> : tu as besoin de moins d'aide. La ligne pointillée marque le seuil de 15 kg — à ce niveau, tu peux tenter ta première traction stricte.</div>"; }
  if(track==="elastique"){ h+="<div style='font-size:11px;color:"+C.dim+";padding:8px 8px 2px;line-height:1.45'>Plus la courbe monte, moins tu as besoin de l'élastique — tu te rapproches de la traction stricte.</div>"; }
  h+="</div>";
  h+=statRow(entries,track,ex.sessionColor);
  return h;
}

function svgChart(entries,track,color,id){
  var W=436,H=210,padL=36,padR=14,padT=14,padB=28;
  var vals=entries.map(function(e){ return track==="poids"?e.load:track==="assist"?e.load:track==="elastique"?e.levelIdx:e.reps; });
  var n=vals.length, minV,maxV;
  if(track==="elastique"){ minV=0;maxV=5; }
  else{
    minV=Math.min.apply(null,vals); maxV=Math.max.apply(null,vals);
    if(track==="assist"){ minV=Math.min(minV,10); maxV=Math.max(maxV,45); }
    if(minV===maxV){ minV=Math.max(0,minV-2); maxV=maxV+2; }
    else { var pd=(maxV-minV)*0.15; minV=Math.max(0,minV-pd); maxV=maxV+pd; }
  }
  var plotW=W-padL-padR, plotH=H-padT-padB;
  function xOf(i){ return n<=1?padL+plotW/2:padL+(plotW*i/(n-1)); }
  function yOf(v){ return padT+plotH*(1-(v-minV)/((maxV-minV)||1)); }
  var svg="<svg viewBox='0 0 "+W+" "+H+"' width='100%' style='display:block'>";
  var gridVals=[];
  if(track==="elastique"){ gridVals=[0,1,2,3,4,5]; }
  else { for(var gi=0;gi<=4;gi++){ gridVals.push(minV+(maxV-minV)*gi/4); } }
  gridVals.forEach(function(gv){
    var y=yOf(gv);
    svg+="<line x1='"+padL+"' y1='"+y+"' x2='"+(W-padR)+"' y2='"+y+"' stroke='"+C.line+"' stroke-width='1' stroke-dasharray='3 3'/>";
    var lbl=track==="elastique"?gv:(Math.round(gv*10)/10);
    svg+="<text x='"+(padL-6)+"' y='"+(y+4)+"' fill='"+C.dim+"' font-size='10' text-anchor='end'>"+lbl+"</text>";
  });
  if(track==="assist" && 15>=minV && 15<=maxV){
    var yT=yOf(15);
    svg+="<line x1='"+padL+"' y1='"+yT+"' x2='"+(W-padR)+"' y2='"+yT+"' stroke='"+C.ok+"' stroke-width='1.5' stroke-dasharray='6 4'/>";
    svg+="<text x='"+(W-padR-2)+"' y='"+(yT-6)+"' fill='"+C.ok+"' font-size='10' text-anchor='end' font-weight='700'>seuil traction</text>";
  }
  if(n>=1){
    var d="";
    entries.forEach(function(e,i){ var x=xOf(i),y=yOf(vals[i]); d+=(i===0?"M":"L")+x.toFixed(1)+" "+y.toFixed(1)+" "; });
    if(n>1){ svg+="<path d='"+d+"' fill='none' stroke='"+color+"' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/>"; }
    entries.forEach(function(e,i){ var x=xOf(i),y=yOf(vals[i]); svg+="<circle cx='"+x.toFixed(1)+"' cy='"+y.toFixed(1)+"' r='4' fill='"+color+"'/>"; });
    var step=Math.ceil(n/6);
    entries.forEach(function(e,i){ if(i%step===0||i===n-1){ var x=xOf(i); svg+="<text x='"+x.toFixed(1)+"' y='"+(H-8)+"' fill='"+C.dim+"' font-size='10' text-anchor='middle'>"+frDate(e.date).slice(0,5)+"</text>"; } });
  }
  return svg+"</svg>";
}

function statRow(entries,track,color){
  var weeks={}; entries.forEach(function(e){ weeks[e.week]=1; });
  var best;
  if(track==="poids") best=Math.max.apply(null,entries.map(function(e){return e.load;}))+" kg";
  else if(track==="assist") best=Math.min.apply(null,entries.map(function(e){return e.load;}))+" kg";
  else if(track==="elastique") best=ELASTIC_LEVELS[Math.max.apply(null,entries.map(function(e){return e.levelIdx;}))];
  else best=Math.max.apply(null,entries.map(function(e){return e.reps;}));
  var lbl=track==="assist"?"Meilleur (min)":track==="elastique"?"Meilleur niveau":"Record";
  var small=(track==="elastique");
  var stats=[["Séances",entries.length],["Semaines",Object.keys(weeks).length],[lbl,best]];
  var h="<div style='display:flex;gap:10px;margin-top:14px'>";
  stats.forEach(function(st,i){
    var big=!(small&&i===2);
    h+="<div style='flex:1;background:"+C.panel+";border:1px solid "+C.line+";border-radius:14px;padding:13px 8px;text-align:center'><div style='font-size:"+(big?20:11.5)+"px;font-weight:800;color:"+color+";line-height:1.2'>"+st[1]+"</div><div style='font-size:10.5px;color:"+C.dim+";text-transform:uppercase;letter-spacing:.5px;margin-top:3px'>"+st[0]+"</div></div>";
  });
  return h+"</div>";
}

function bodyChart(pts,key,color){
  var W=436,H=200,padL=40,padR=14,padT=14,padB=28;
  var vals=pts.map(function(p){ return p[key]; });
  var n=vals.length;
  var minV=Math.min.apply(null,vals), maxV=Math.max.apply(null,vals);
  if(minV===maxV){ minV=minV-1.5; maxV=maxV+1.5; } else { var pd=(maxV-minV)*0.18; minV=minV-pd; maxV=maxV+pd; }
  var plotW=W-padL-padR, plotH=H-padT-padB;
  function xOf(i){ return n<=1?padL+plotW/2:padL+(plotW*i/(n-1)); }
  function yOf(v){ return padT+plotH*(1-(v-minV)/((maxV-minV)||1)); }
  var svg="<svg viewBox='0 0 "+W+" "+H+"' width='100%' style='display:block'>";
  for(var gi=0;gi<=4;gi++){
    var gv=minV+(maxV-minV)*gi/4, y=yOf(gv);
    svg+="<line x1='"+padL+"' y1='"+y+"' x2='"+(W-padR)+"' y2='"+y+"' stroke='"+C.line+"' stroke-width='1' stroke-dasharray='3 3'/>";
    svg+="<text x='"+(padL-6)+"' y='"+(y+4)+"' fill='"+C.dim+"' font-size='10' text-anchor='end'>"+(Math.round(gv*10)/10)+"</text>";
  }
  var d="",ar="";
  pts.forEach(function(p,i){ var x=xOf(i),y=yOf(vals[i]); d+=(i===0?"M":"L")+x.toFixed(1)+" "+y.toFixed(1)+" "; });
  if(n>1){
    ar=d+"L"+xOf(n-1).toFixed(1)+" "+(H-padB)+" L"+xOf(0).toFixed(1)+" "+(H-padB)+" Z";
    svg+="<path d='"+ar+"' fill='"+color+"' opacity='.10'/>";
    svg+="<path d='"+d+"' fill='none' stroke='"+color+"' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/>";
  }
  pts.forEach(function(p,i){ var x=xOf(i),y=yOf(vals[i]); svg+="<circle cx='"+x.toFixed(1)+"' cy='"+y.toFixed(1)+"' r='4' fill='"+color+"'/>"; });
  var step=Math.ceil(n/6);
  pts.forEach(function(p,i){ if(i%step===0||i===n-1){ var x=xOf(i); svg+="<text x='"+x.toFixed(1)+"' y='"+(H-8)+"' fill='"+C.dim+"' font-size='10' text-anchor='middle'>"+frDate(p.date).slice(0,5)+"</text>"; } });
  return svg+"</svg>";
}

function viewGuide(){
  var h="<div class='fade' style='padding:calc(24px + env(safe-area-inset-top)) 16px 8px'>";
  h+="<h1 style='margin:6px 0 4px'>Exercices</h1><p style='color:"+C.dim+";font-size:13px;margin:0 0 18px;line-height:1.5'>La fiche technique de chaque mouvement : comment bien faire, et les erreurs à éviter pour ne pas te blesser.</p>";
  Object.keys(PROGRAM).forEach(function(k){
    var s=PROGRAM[k];
    h+="<div style='margin-bottom:22px'><div style='display:flex;align-items:center;gap:8px;margin-bottom:10px'><div style='width:4px;height:18px;background:"+s.color+";border-radius:4px'></div><span style='font-weight:800;font-size:15px'>"+s.name+"</span><span style='color:"+C.dim+";font-size:12px'>· "+s.day+"</span></div>";
    s.exercises.forEach(function(ex){
      h+="<button class='press' data-detail='"+ex.id+"' style='width:100%;text-align:left;background:"+C.panel+";border:1px solid "+C.line+";border-radius:14px;padding:11px 13px;margin-bottom:9px;color:"+C.text+";display:flex;align-items:center;gap:12px'>";
      h+="<div style='width:50px;height:38px;background:"+C.panel2+";border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid "+C.line+"'><div style='width:42px;height:30px'>"+figure(ex.fig)+"</div></div>";
      h+="<div style='flex:1;min-width:0'><div style='font-weight:700;font-size:13.5px;line-height:1.25'>"+ex.name+"</div><div style='color:"+C.dim+";font-size:11.5px;margin-top:2px'>"+ex.target+" · "+ex.sets+"×"+ex.reps+"</div></div>";
      h+="<div style='transform:rotate(180deg);flex-shrink:0'>"+icon("back",17,C.dim)+"</div></button>";
    });
    h+="</div>";
  });
  return h+"</div>";
}

function viewDetail(id){
  var ex=ALL[id]; if(!ex) return "";
  var color=ex.sessionColor||C.rust, meta=TRACK_LABEL[ex.track];
  var entries=LOGS[id]||[];
  var h="<div class='fade'>"+header(color,ex.name,ex.target+" · "+ex.sets+" × "+ex.reps+" · repos "+ex.rest);
  h+="<div style='padding:16px 16px 40px'>";
  h+="<div style='background:"+C.panel+";border:1px solid "+C.line+";border-radius:18px;padding:18px;margin-bottom:18px;display:flex;justify-content:center'><div style='width:72%;max-width:230px;aspect-ratio:5/3'>"+figure(ex.fig)+"</div></div>";
  h+="<div style='display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap'><span class='chip'>"+ex.sets+" séries</span><span class='chip'>"+ex.reps+" reps</span><span class='chip'>Repos "+ex.rest+"</span><span class='chip' style='color:"+meta.tint+"'>"+meta.label+"</span></div>";
  h+="<div style='margin-bottom:22px'><div style='display:flex;align-items:center;gap:8px;margin-bottom:12px'>"+icon("checkcircle",19,C.ok)+"<h3 style='margin:0;font-size:16px;font-weight:800'>Comment bien faire</h3></div><ul style='margin:0;padding:0;list-style:none'>";
  ex.how.forEach(function(t,i){ h+="<li style='margin-bottom:9px;line-height:1.5;font-size:14px'><span style='color:"+C.ok+";font-weight:700;margin-right:6px'>"+(i+1)+".</span>"+t+"</li>"; });
  h+="</ul></div>";
  h+="<div style='margin-bottom:22px'><div style='display:flex;align-items:center;gap:8px;margin-bottom:12px'>"+icon("warn",19,C.red)+"<h3 style='margin:0;font-size:16px;font-weight:800'>Erreurs à éviter</h3></div><ul style='margin:0;padding:0;list-style:none'>";
  ex.avoid.forEach(function(t){ h+="<li style='margin-bottom:9px;line-height:1.5;font-size:14px;display:flex;gap:8px'><span style='color:"+C.red+";flex-shrink:0;margin-top:1px'>✕</span><span>"+t+"</span></li>"; });
  h+="</ul></div>";
  if(entries.length>0){
    var l=entries[entries.length-1];
    h+="<div style='background:"+C.panel2+";border:1px solid "+C.line+";border-radius:14px;padding:14px'><div style='font-size:12px;color:"+C.dim+";margin-bottom:6px;font-weight:600'>Ta dernière performance</div><div style='font-size:16px;font-weight:700;color:"+color+"'>"+formatEntry(l,ex.track)+"<span style='color:"+C.dim+";font-weight:400;font-size:12px;margin-left:8px'>le "+frDate(l.date)+"</span></div></div>";
  }
  h+="</div></div>";
  return h;
}

/* ================= BINDINGS ================= */
var OPEN_FORM=null, OPEN_HIST={}, FORM_LEVEL={};

function bind(){
  app.querySelectorAll("[data-tab]").forEach(function(b){ b.onclick=function(){ go({tab:b.getAttribute("data-tab"),session:null,detail:null}); }; });
  app.querySelectorAll("[data-back]").forEach(function(b){ b.onclick=function(){ OPEN_FORM=null; go({session:null,detail:null}); }; });
  app.querySelectorAll("[data-session]").forEach(function(b){ b.onclick=function(){ OPEN_FORM=null;OPEN_HIST={}; go({session:b.getAttribute("data-session")}); }; });
  app.querySelectorAll("[data-detail]").forEach(function(b){ b.onclick=function(){ go({detail:b.getAttribute("data-detail")}); }; });
  app.querySelectorAll("[data-psel]").forEach(function(b){ b.onclick=function(){ STATE.progressSel=b.getAttribute("data-psel"); render(); }; });
  app.querySelectorAll("[data-bmetric]").forEach(function(b){ b.onclick=function(){ STATE.bodyMetric=b.getAttribute("data-bmetric"); render(); }; });
  app.querySelectorAll("[data-toggle]").forEach(function(b){ b.onclick=function(){ var id=b.getAttribute("data-toggle"); OPEN_FORM=(OPEN_FORM===id)?null:id; refreshCard(id); }; });
  app.querySelectorAll("[data-hist]").forEach(function(b){ b.onclick=function(){ var id=b.getAttribute("data-hist"); OPEN_HIST[id]=!OPEN_HIST[id]; refreshCard(id); }; });
  app.querySelectorAll("[data-wk]").forEach(function(b){ b.onclick=function(){ var d=parseInt(b.getAttribute("data-wk"),10); META.week=Math.max(1,(META.week||1)+d); saveMeta(); render(); }; });
  var ex=app.querySelector("[data-export]"); if(ex) ex.onclick=doExport;
  var im=app.querySelector("[data-import]"); if(im) im.onclick=function(){ var f=document.getElementById("importfile"); if(f) f.click(); };
  var imf=document.getElementById("importfile"); if(imf) imf.onchange=doImport;
  var si=app.querySelector("[data-signin]"); if(si) si.onclick=doSignIn;
  var so=app.querySelector("[data-signout]"); if(so) so.onclick=function(){ if(confirm("Te déconnecter ? Tes données restent sauvegardées dans le cloud et sur cet appareil.")) doSignOut(); };
  paintSyncBadge();
  var bs=document.getElementById("bsave"); if(bs) bs.onclick=saveBodyEntry;
  app.querySelectorAll("[data-bdel]").forEach(function(b){ b.onclick=function(){ BODY.splice(parseInt(b.getAttribute("data-bdel"),10),1); saveBody(); render(); }; });
  bindCardInner();
}

function bindCardInner(){
  app.querySelectorAll("[data-levels]").forEach(function(zone){
    zone.querySelectorAll("[data-level]").forEach(function(pill){
      pill.onclick=function(){
        var form=zone.closest("[data-form]"), id=form.getAttribute("data-form");
        FORM_LEVEL[id]=parseInt(pill.getAttribute("data-level"),10);
        var color=ALL[id].sessionColor;
        zone.querySelectorAll("[data-level]").forEach(function(x){ x.style.borderColor="";x.style.background="";x.style.color=""; });
        pill.style.borderColor=color; pill.style.background=color; pill.style.color=C.bg;
      };
    });
  });
  app.querySelectorAll("[data-save]").forEach(function(b){ b.onclick=function(){ saveEntry(b.getAttribute("data-save")); }; });
  app.querySelectorAll("[data-rest]").forEach(function(b){ b.onclick=function(){ startRest(parseInt(b.getAttribute("data-rest"),10)); }; });
  app.querySelectorAll("[data-del]").forEach(function(b){
    b.onclick=function(){
      var parts=b.getAttribute("data-del").split(":"), id=parts[0], idx=parseInt(parts[1],10);
      (LOGS[id]||[]).splice(idx,1); if(LOGS[id]&&LOGS[id].length===0){ delete LOGS[id]; }
      saveLogs(); refreshCard(id);
    };
  });
}

function refreshCard(id){
  var card=app.querySelector("[data-card='"+id+"']");
  if(!card){ render(); return; }
  var ex=ALL[id], k=ex.sessionKey, color=ex.sessionColor;
  var fz=card.querySelector("[data-form='"+id+"']");
  if(OPEN_FORM===id){ fz.classList.remove("hidden"); fz.innerHTML=entryForm(ex,k,color); if(FORM_LEVEL[id]==null) FORM_LEVEL[id]=2; }
  else { fz.classList.add("hidden"); fz.innerHTML=""; }
  var tog=card.querySelector("[data-toggle='"+id+"']");
  if(tog){ tog.innerHTML=(OPEN_FORM===id?icon("x",15,C.text):icon("plus",15,color))+(OPEN_FORM===id?" Fermer":" Noter"); tog.style.color=OPEN_FORM===id?C.text:color; tog.style.background=OPEN_FORM===id?C.panel2:"none"; }
  var hz=card.querySelector("[data-histzone='"+id+"']");
  if(hz){ if(OPEN_HIST[id]){ hz.classList.remove("hidden"); hz.innerHTML=historyList(ex); } else { hz.classList.add("hidden"); hz.innerHTML=""; } }
  var hb=card.querySelector("[data-hist='"+id+"']");
  if(hb){ hb.textContent="Historique ("+((LOGS[id]||[]).length)+")"; }
  bindCardInner();
}

function saveEntry(id){
  var ex=ALL[id], k=ex.sessionKey;
  var card=app.querySelector("[data-card='"+id+"']");
  var fz=card.querySelector("[data-form='"+id+"']");
  var base={date:todayStr(),session:k,week:isoWeek(todayStr())};
  var entry=null;
  if(ex.track==="poids"||ex.track==="assist"){
    var load=fz.querySelector("[data-load]").value, reps=fz.querySelector("[data-reps]").value;
    if(load===""||reps==="") return;
    entry=Object.assign(base,{load:Number(load),reps:Number(reps)});
  } else if(ex.track==="elastique"){
    var r2=fz.querySelector("[data-reps]").value;
    if(r2==="") return;
    var lvl=FORM_LEVEL[id]!=null?FORM_LEVEL[id]:2;
    entry=Object.assign(base,{level:ELASTIC_LEVELS[lvl],levelIdx:lvl,reps:Number(r2)});
  } else {
    var r3=fz.querySelector("[data-reps]").value;
    if(r3==="") return;
    entry=Object.assign(base,{reps:Number(r3)});
  }
  if(!LOGS[id]) LOGS[id]=[];
  LOGS[id].push(entry);
  saveLogs();
  OPEN_FORM=null;
  if(navigator.vibrate) navigator.vibrate(45);
  var rs=restSeconds(ex);
  card.outerHTML=exerciseCard(ex,k,ex.sessionColor);
  bind();
  if(rs) startRest(rs);
}

function saveBodyEntry(){
  var w=document.getElementById("bw").value, t=document.getElementById("bt").value;
  if(w===""&&t==="") return;
  var d=todayStr();
  var existing=null;
  BODY.forEach(function(b){ if(b.date===d) existing=b; });
  if(!existing){ existing={date:d,weight:null,waist:null}; BODY.push(existing); }
  if(w!=="") existing.weight=Number(w);
  if(t!=="") existing.waist=Number(t);
  BODY.sort(function(a,b){ return a.date<b.date?-1:1; });
  saveBody();
  if(navigator.vibrate) navigator.vibrate(45);
  render();
}

function doExport(){
  var payload={exportedAt:new Date().toISOString(),meta:META,logs:LOGS,body:BODY};
  var blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="coach-calli-sauvegarde.json";
  a.click();
}

function doImport(ev){
  var file=ev.target.files && ev.target.files[0];
  if(!file) return;
  var rd=new FileReader();
  rd.onload=function(){
    try{
      var p=JSON.parse(rd.result);
      var nLogs=p.logs||{}, nBody=p.body||[];
      var addedL=0;
      Object.keys(nLogs).forEach(function(k){ addedL+=(nLogs[k]||[]).length; });
      LOGS=mergeLogs(LOGS,nLogs);
      BODY=mergeBody(BODY,nBody);
      if(p.meta && p.meta.week) META.week=Math.max(META.week||1,p.meta.week);
      persist();
      render();
      alert("Import réussi : "+addedL+" entrée(s) d'exercice et "+nBody.length+" mesure(s) fusionnées.");
    }catch(e){
      alert("Fichier illisible. Vérifie que c'est bien un export de l'application (.json).");
    }
    ev.target.value="";
  };
  rd.readAsText(file);
}

render();
initCloud();
</script>
